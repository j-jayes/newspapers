name: Build OCR VLM Server Images

on:
  push:
    paths:
      - "docker/**"
    branches: [main]
  workflow_dispatch:  # allow manual trigger

env:
  REGISTRY: ghcr.io

jobs:
  build-ocr-endpoint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (GLM-OCR / LightOnOCR-2)
        uses: docker/build-push-action@v6
        with:
          context: docker/ocr-endpoint
          push: true
          tags: |
            ${{ env.REGISTRY }}/j-jayes/ocr-vlm-server:latest
            ${{ env.REGISTRY }}/j-jayes/ocr-vlm-server:${{ github.sha }}
          cache-from: type=gha,scope=ocr-endpoint
          cache-to: type=gha,mode=max,scope=ocr-endpoint

  build-deepseek-ocr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (DeepSeek-OCR-2)
        uses: docker/build-push-action@v6
        with:
          context: docker/deepseek-ocr
          push: true
          tags: |
            ${{ env.REGISTRY }}/j-jayes/deepseek-ocr-server:latest
            ${{ env.REGISTRY }}/j-jayes/deepseek-ocr-server:${{ github.sha }}
          cache-from: type=gha,scope=deepseek-ocr
          cache-to: type=gha,mode=max,scope=deepseek-ocr
